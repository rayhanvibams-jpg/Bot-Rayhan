<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝚁𝙰𝚈𝙷𝙰𝙽 𝚂𝚃𝙾𝚁𝙴</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#0f2027,#000);
  color:white;
}

.header{
  padding:15px;
  background:#000;
  text-align:center;
}

.container{ padding:15px; }

.card{
  background:#111;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

img{
  width:100%;
  border-radius:15px;
}

.price{ color:#00ffc8; }

.btn{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#25D366;
  color:white;
  width:100%;
}
</style>
</head>

<body>

<div class="header">
  <h2>𝚁𝙰𝚈𝙷𝙰𝙽 𝚂𝚃𝙾𝚁𝙴</h2>
</div>

<div class="container" id="list"></div>

<script>
// 📦 DATA PRODUK (EDIT DI SINI)
const produk = [
  {
    nama: "Panel Pterodactyl",
    desk: "Panel bot no delay, fast & stabil",
    harga: "10.000",
    img: "https://via.placeholder.com/300"
  },
  {
    nama: "Script Bot WA",
    desk: "Full fitur + no enc",
    harga: "25.000",
    img: "https://via.placeholder.com/300"
  }
];

// 📱 NOMOR WA KAMU
const nomor = "628XXXXXXXXXX";

// 🔥 TAMPIL PRODUK
function tampil(){
  let list = document.getElementById("list");

  produk.forEach(p=>{
    list.innerHTML += `
    <div class="card">
      <img src="${p.img}">
      <h3>${p.nama}</h3>
      <p>${p.desk}</p>
      <div class="price">Rp ${p.harga}</div>

      <button class="btn" onclick="beli('${p.nama}','${p.harga}')">
        Beli via WhatsApp
      </button>
    </div>
    `;
  });
}

// 🛒 BELI
function beli(nama,harga){
  let text = `Halo admin, saya mau beli:\n\nProduk: ${nama}\nHarga: Rp ${harga}`;
  window.open(`https://wa.me/${nomor}?text=${encodeURIComponent(text)}`);
}

tampil();
</script>

</body>
  </html>
