<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAYHANZ BOT STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* LOBBY */
.lobby{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#022c22,#020617);
}

.box{
  width:90%;
  max-width:400px;
  padding:20px;
  border-radius:25px;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 40px #00ffcc55;
  text-align:center;
}

.live{
  padding:5px 12px;
  border-radius:20px;
  background:#022c22;
  color:#00ffcc;
  box-shadow:0 0 10px #00ffcc;
  display:inline-block;
}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:20px;
  margin:5px 0;
  cursor:pointer;
  color:white;
}

.red{background:linear-gradient(45deg,#ff4d4d,#ff7a00);}
.green{background:linear-gradient(45deg,#00c853,#00ffcc);}

/* STORE */
#store{display:none;padding:10px;}

.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 15px #00ffcc55;
  position:relative;
  overflow:hidden;
}

.card::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:50%;
  background:linear-gradient(transparent,black);
}

.img-produk{
  width:100%;
  border-radius:15px;
}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

/* ZOOM */
#zoomImg{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}
#zoomImg img{
  max-width:90%;
  border-radius:20px;
}
</style>
</head>

<body>

<!-- LOBBY -->
<div id="lobby" class="lobby">
  <div class="box">
    <div class="live">● LIVE</div>
    <h1>RAYHANZ BOT</h1>
    <p>Jadibot WhatsApp & otomatisasi</p>

    <button class="btn red" onclick="masukStore()">🛒 MASUK STORE</button>

    <button class="btn green"
    onclick="window.open('https://wa.me/6282395491652?text=KAK%20SAYA%20MAU%20JADI%20BOT%20WA%20FREE')">
    Jadibot WA Free 7H
    </button>

    <button class="btn green"
    onclick="window.open('https://wa.me/6282395491652?text=SAYA%20MAU%20LAPOR%20BUG')">
    Lapor Bug
    </button>

    <button class="btn green"
    onclick="window.open('https://wa.me/6282395491652?text=SAYA%20MAU%20REQUEST%20FITUR')">
    Request Fitur
    </button>

  </div>
</div>

<!-- STORE -->
<div id="store">

<!-- MENU LINK -->
<div class="card">

  <button class="btn" style="background:#ff0000"
    onclick="window.open('https://youtube.com/')">
    ▶ Tutorial YouTube
  </button>

  <button class="btn" style="background:#22c55e"
    onclick="window.open('https://wa.me/6282395491652')">
    🤖 Jadibot WhatsApp
  </button>

  <button class="btn" style="background:#0ea5e9"
    onclick="window.open('https://whatsapp.com/channel/0029Vb8BmhnBfxo2hcY81k2i')">
    💚 Saluran WhatsApp
  </button>

  <!-- 🔥 TAMBAHAN -->
  <button class="btn" style="background:#25D366"
    onclick="window.open('https://chat.whatsapp.com/Fd15FbEJE145DmxIUcP70Y?mode=gi_t')">
    👥 Join Grup WhatsApp
  </button>

</div>

<!-- PRODUK -->
<div id="semuaProduk"></div>

</div>

<!-- ZOOM -->
<div id="zoomImg" onclick="tutupZoom()">
  <img id="imgZoom">
</div>

<script>
/* DATA */
const semua=[
  {nama:"PANEL RANDOM",harga:"20000",desk:"Panel random",badge:"BEST"},
  {nama:"SCRIPT BOT BASIC",harga:"15000",desk:"Fitur dasar",badge:"NEW"},
  {nama:"SCRIPT BOT PANEL",harga:"80000",desk:"Bot untuk membuat panel",badge:"NEW"},
  {nama:"SCRIPT BOT PREMIUM",harga:"70000",desk:"Full fitur + update seumur hidup",badge:"BEST"},
  {nama:"BUAT APLIKASI/WEB",harga:"100000",desk:"Membuat desain aplikasi/Web online",badge:"BEST"},
  {nama:"SCRIPT BOT OWNER",harga:"60000",desk:"Full Fitur",badge:"HOT"}
];

function tampilSemua(){
  let list=document.getElementById("semuaProduk");
  list.innerHTML="";

  semua.forEach(p=>{
    list.innerHTML+=`
    <div class="card">
      ${p.badge?`<div class="badge">${p.badge}</div>`:""}
      <h3>${p.nama}</h3>
      <p>${p.desk}</p>
      <h2>Rp ${p.harga}</h2>
      <button class="btn" style="background:orange"
      onclick="beliWA('${p.nama}','${p.harga}')">
      Beli
      </button>
    </div>`;
  });
}

/* BELI LANGSUNG WA */
function beliWA(nama,harga){
  let text = `Halo admin saya mau beli ${nama} (Rp ${harga})`;
  window.open(`https://wa.me/6282395491652?text=${encodeURIComponent(text)}`);
}

/* NAV */
function masukStore(){
  lobby.style.display="none";
  store.style.display="block";
}

/* ZOOM */
function tutupZoom(){
  zoomImg.style.display="none";
}

/* LOAD */
window.onload = () => {
  tampilSemua();
};
</script>

</body>
</html>
